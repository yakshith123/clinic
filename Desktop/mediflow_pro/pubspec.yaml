name: mediflow_pro
description: A new Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  dio: ^5.3.2
  intl: ^0.18.1
  url_launcher: ^6.1.14
  image_picker: ^1.0.4
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  google_sign_in: ^6.1.5
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  equatable: ^2.0.5
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.2
  rxdart: ^0.27.7
  fluttertoast: ^8.2.4
  permission_handler: ^11.1.0
  ionicons: ^0.2.2  # Added missing ionicons package
  pinput: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/
    - assets/ads/