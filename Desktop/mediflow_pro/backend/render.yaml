# Render.com Deployment Configuration

services:
  - type: web
    name: mediflow-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python add_google_columns.py && python make_password_hash_nullable.py && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

# Environment variables to set in Render dashboard:
# SECRET_KEY=your-very-secure-secret-key
# DATABASE_URL=your-postgresql-database-url
# CORS_ORIGINS=https://your-frontend-domain.com